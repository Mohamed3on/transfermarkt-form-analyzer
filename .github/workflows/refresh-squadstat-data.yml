name: Refresh SquadStat Data

on:
  schedule:
    - cron: "0 */3 * * *"
    - cron: "0 6 * * 1" # Weekly Monday 6am UTC for biggest-movers
  workflow_dispatch:

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  warm-caches:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 */3 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Warm API caches
        env:
          PROD_URL: ${{ secrets.PRODUCTION_URL }}
        run: |
          echo "Warming analyze..."
          ANALYZE=$(curl -sf "$PROD_URL/api/analyze" || echo '{}')

          echo "Warming other endpoints in parallel..."
          curl -sf "$PROD_URL/api/expected-position" > /dev/null &
          curl -sf "$PROD_URL/api/injured" > /dev/null &
          wait

          echo "Warming manager pages..."
          CLUB_IDS=$(echo "$ANALYZE" | jq -r '
            [.analysis[]? | .topTeams[]?, .bottomTeams[]? | .clubId // empty]
            | unique[]' 2>/dev/null || true)

          for id in $CLUB_IDS; do
            curl -sf "$PROD_URL/api/manager/$id" > /dev/null &
          done
          wait
          echo "Done warming caches."

  refresh-minutes-value:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 */3 * * *'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Restore player cache
        uses: actions/cache/restore@v4
        with:
          path: data/player-cache.json
          key: player-cache-${{ github.run_id }}
          restore-keys: player-cache-

      - name: Run refresh script
        id: refresh
        run: bun run scripts/refresh-minutes-value.ts

      - name: Save player cache
        uses: actions/cache/save@v4
        with:
          path: data/player-cache.json
          key: player-cache-${{ github.run_id }}

      - name: Commit and push
        run: bash scripts/ci-push.sh "chore: refresh minutes-value data" data/minutes-value.json data/updated-at.txt

      - name: Alert on failure
        if: failure() && steps.refresh.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh label create "scraper-broken" --color "d73a4a" 2>/dev/null || true
          EXISTING=$(gh issue list --label "scraper-broken" --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "Alert issue #$EXISTING already open, skipping."
          else
            gh issue create \
              --title "Scraper broken: data refresh failed" \
              --label "scraper-broken" \
              --body "The data refresh script failed. Transfermarkt may have changed their page structure again.

          **Run:** $RUN_URL

          Check \`lib/fetch-player-minutes.ts\` — the ceapi or HTML selectors likely need updating."
          fi

  refresh-biggest-movers:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 6 * * 1'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run refresh script
        run: bun run scripts/refresh-biggest-movers.ts

      - name: Commit and push
        run: bash scripts/ci-push.sh "chore: refresh biggest-movers data" data/biggest-winners.json data/biggest-losers.json data/biggest-movers-updated-at.txt
