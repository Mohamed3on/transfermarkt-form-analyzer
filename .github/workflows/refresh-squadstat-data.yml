name: Refresh SquadStat Data

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:
    inputs:
      force_refresh:
        description: "Bypass player cache and re-fetch all players"
        type: boolean
        default: false
      stale_hours:
        description: "Cache TTL in hours (default 12; 1 for button-triggered aggressive refresh)"
        type: string
        required: false

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  warm-caches:
    runs-on: ubuntu-latest
    steps:
      - name: Warm API caches
        env:
          PROD_URL: ${{ secrets.PRODUCTION_URL }}
        run: |
          echo "Warming analyze..."
          ANALYZE=$(curl -sf "$PROD_URL/api/analyze" || echo '{}')

          echo "Warming other endpoints in parallel..."
          curl -sf "$PROD_URL/api/expected-position" > /dev/null &
          curl -sf "$PROD_URL/api/injured" > /dev/null &
          wait

          echo "Warming manager pages..."
          CLUB_IDS=$(echo "$ANALYZE" | jq -r '
            [.analysis[]? | .topTeams[]?, .bottomTeams[]? | .clubId // empty]
            | unique[]' 2>/dev/null || true)

          for id in $CLUB_IDS; do
            curl -sf "$PROD_URL/api/manager/$id" > /dev/null &
          done
          wait
          echo "Done warming caches."

  refresh-minutes-value:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Restore player cache
        uses: actions/cache/restore@v4
        with:
          path: data/player-cache.json
          key: player-cache-${{ github.run_id }}
          restore-keys: player-cache-

      - name: Run refresh scripts
        id: refresh
        env:
          TM_COOKIE: ${{ secrets.TM_COOKIE }}
          TM_2CAPTCHA_KEY: ${{ secrets.TM_2CAPTCHA_KEY }}
          FORCE_REFRESH: ${{ inputs.force_refresh && '1' || '0' }}
          STALE_HOURS: ${{ inputs.stale_hours }}
        run: bun run scripts/refresh-minutes-value.ts

      - name: Sync fresh cookie
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # If the refresh script solved a fresh cookie, it writes it here
          [ -f /tmp/tm-fresh-cookie.txt ] || exit 0
          COOKIE=$(cat /tmp/tm-fresh-cookie.txt)
          echo "Syncing fresh cookie to GitHub secret + Vercel..."
          echo -n "$COOKIE" | gh secret set TM_COOKIE
          PROJECT_ID="prj_wFW1sJsFd48VNhm9KWAN19vmLA2N"
          TEAM_ID="team_0AB8ygPQlmDZKieEgjsCzIoD"
          API="https://api.vercel.com"
          AUTH="Authorization: Bearer $VERCEL_TOKEN"
          ENV_ID=$(curl -sf -H "$AUTH" "$API/v9/projects/$PROJECT_ID/env?teamId=$TEAM_ID" \
            | jq -r '.envs[] | select(.key == "TM_COOKIE") | .id' 2>/dev/null || true)
          if [ -n "$ENV_ID" ]; then
            curl -sf -X DELETE -H "$AUTH" "$API/v9/projects/$PROJECT_ID/env/$ENV_ID?teamId=$TEAM_ID" || true
          fi
          curl -sf -X POST -H "$AUTH" -H "Content-Type: application/json" \
            -d "$(jq -n --arg v "$COOKIE" '{key:"TM_COOKIE",value:$v,target:["production"],type:"encrypted"}')" \
            "$API/v10/projects/$PROJECT_ID/env?teamId=$TEAM_ID"
          echo "Cookie synced."

      - name: Save player cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/player-cache.json
          key: player-cache-${{ github.run_id }}

      - name: Commit and push
        run: |
          bash scripts/ci-push.sh "chore: refresh minutes-value data" data/minutes-value.json data/updated-at.txt data/player-pool.json data/player-pool-updated-at.txt

      - name: Alert on failure
        if: failure() && steps.refresh.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh label create "scraper-broken" --color "d73a4a" 2>/dev/null || true
          EXISTING=$(gh issue list --label "scraper-broken" --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "Alert issue #$EXISTING already open, skipping."
          else
            BODY="The data refresh script failed. Transfermarkt may have changed their page structure again."
            BODY="$BODY"$'\n\n'"**Run:** $RUN_URL"
            BODY="$BODY"$'\n\n'"Check \`lib/fetch-player-minutes.ts\` — the ceapi or HTML selectors likely need updating."
            gh issue create --title "Scraper broken: data refresh failed" --label "scraper-broken" --body "$BODY"
          fi

  check-mv-updates:
    runs-on: ubuntu-latest
    outputs:
      has_updates: ${{ steps.check.outputs.has_updates }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check for market value updates today
        id: check
        env:
          TM_COOKIE: ${{ secrets.TM_COOKIE }}
        run: |
          if bun run scripts/check-mv-updates.ts; then
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          fi

  refresh-biggest-movers:
    needs: [check-mv-updates]
    if: needs.check-mv-updates.outputs.has_updates == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run refresh script
        env:
          TM_COOKIE: ${{ secrets.TM_COOKIE }}
        run: bun run scripts/refresh-biggest-movers.ts

      - name: Commit and push
        run: |
          bash scripts/ci-push.sh "chore: refresh biggest-movers data" data/biggest-winners.json data/biggest-losers.json data/biggest-movers-updated-at.txt
